# policy.yaml
version: "1.0"
policy_name: Mindoor-Healthcare-HIPAA-Policy
default_action: ALLOW

ingress_rules:
  # Rule 1: Block prompt injection / jailbreak attempts targeting PHI exfiltration
  - name: block_prompt_injection
    priority: 100
    action: QUARANTINE
    deny_message: "[LOBSTER TRAP] HIPAA Security Alert: Adversarial prompt injection detected. This interaction has been logged for compliance review."
    conditions:
      - field: contains_injection_patterns
        match_type: boolean
        value: true

  # Rule 2: Prevent PHI / patient data exfiltration
  - name: block_exfiltration
    priority: 90
    action: DENY
    deny_message: "[LOBSTER TRAP] PHI Guard Alert: This request attempts unauthorized extraction of protected health information. Logged for compliance."
    conditions:
      - field: contains_exfiltration
        match_type: boolean
        value: true

  # Rule 3: Flag PII / PHI for human review (HIPAA minimum necessary standard)
  - name: flag_patient_data
    priority: 80
    action: HUMAN_REVIEW
    deny_message: "[LOBSTER TRAP] PHI Review Required: This request contains protected health information and has been queued for manual compliance review."
    conditions:
      - field: contains_pii
        match_type: boolean
        value: true
